<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figurorama - Order Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; background: white !important; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; max-width: 100%; border: none !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm no-print">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="font-bold text-lg">Figurorama Order Manager</h1>
            <a href="index.html" class="text-sm text-emerald-600 hover:underline">← Kembali ke Katalog</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 no-print">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-extrabold text-xl">📦 Antrean Pesanan</h2>
                <button onclick="fetchOrders()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-xl text-sm transition">🔄 Refresh</button>
            </div>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b text-gray-400 text-xs uppercase font-bold bg-gray-50">
                        <th class="py-3 px-4">Waktu</th>
                        <th class="py-3 px-4">Nama</th>
                        <th class="py-3 px-4">Produk</th>
                        <th class="py-3 px-4">Alamat</th>
                        <th class="py-3 px-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="order-table-body" class="text-sm divide-y">
                    <tr><td colspan="5" class="text-center py-8 text-gray-400">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <div id="print-area" class="hidden fixed inset-0 bg-white p-6 z-50">
        <div class="border-4 border-dashed border-gray-800 p-6 rounded-md">
            <div class="border-b-2 border-gray-800 pb-4 mb-4">
                <h2 class="font-black text-2xl">FIGURORAMA</h2>
                <p class="text-xs">Action Figures & Collectibles</p>
            </div>
            <div class="space-y-4">
                <div>
                    <span class="text-xs font-bold text-gray-500 uppercase">Penerima:</span>
                    <h3 id="lbl-penerima" class="text-xl font-black">Nama (HP)</h3>
                </div>
                <div class="bg-gray-50 p-3 border">
                    <span class="text-xs font-bold text-gray-500 uppercase">Alamat:</span>
                    <p id="lbl-alamat" class="text-sm font-medium">Alamat Lengkap</p>
                </div>
                <div class="border-t-2 border-gray-800 pt-3">
                    <span class="text-xs font-bold text-gray-500 uppercase">Item:</span>
                    <p id="lbl-produk" class="text-xs font-bold bg-gray-100 p-2 mt-1">Produk</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const orderCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT4brsOWYbLuGELkJLNOKKWXpp_3Mjl9SfLtEZrubTICoBrPdwlYrbz0Cl-YC20DnrBMjvdTMhuLc2U/pub?gid=214571553&single=true&output=csv";

        async function fetchOrders() {
            const tbody = document.getElementById('order-table-body');
            const res = await fetch(orderCsvUrl);
            const raw = await res.text();
            const lines = raw.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            
            const namaKey = headers.find(h => /nama/i.test(h));
            const alamatKey = headers.find(h => /alamat/i.test(h));
            const produkKey = headers.find(h => /produk/i.test(h));
            const hpKey = headers.find(h => /hp|telepon|whatsapp/i.test(h));

            tbody.innerHTML = lines.slice(1).reverse().map(line => {
                const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length < headers.length) return '';
                const data = {};
                headers.forEach((h, i) => data[h] = (cols[i] || '').replace(/"/g, ''));
                
                return `<tr>
                    <td class="py-4 px-4 text-xs">${data[headers[0]] || '-'}</td>
                    <td class="py-4 px-4 font-bold">${data[namaKey] || '-'}</td>
                    <td class="py-4 px-4 text-emerald-700 text-xs">${data[produkKey] || '-'}</td>
                    <td class="py-4 px-4 text-xs">${data[alamatKey] || '-'}</td>
                    <td class="py-4 px-4 text-center">
                        <button onclick="printLabel('${btoa(data[namaKey])}', '${btoa(data[alamatKey])}', '${btoa(data[produkKey])}', '${btoa(data[hpKey] || '-')}')" class="bg-blue-600 text-white text-xs px-3 py-1 rounded">🖨️ Cetak</button>
                    </td>
                </tr>`;
            }).join('');
        }

        function printLabel(n, a, p, h) {
            document.getElementById('lbl-penerima').innerText = `${atob(n)} (${atob(h)})`;
            document.getElementById('lbl-alamat').innerText = atob(a);
            document.getElementById('lbl-produk').innerText = atob(p);
            document.getElementById('print-area').classList.remove('hidden');
            setTimeout(() => { window.print(); document.getElementById('print-area').classList.add('hidden'); }, 250);
        }

        window.onload = fetchOrders;
    </script>
</body>
</html>
