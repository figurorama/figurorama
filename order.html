<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figurorama - Order Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body * { visibility: hidden; background: white !important; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; border: none !important; padding: 0; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="bg-white shadow-sm no-print">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <img src="logo.jpg" alt="Logo" class="h-10 w-10 object-cover rounded-full" onerror="this.src='https://via.placeholder.com/40?text=F'">
                <div>
                    <h1 class="font-bold text-lg text-gray-800">Figurorama Order Manager</h1>
                    <p class="text-xs text-gray-500">Daftar pesanan masuk & cetak label paket</p>
                </div>
            </div>
            <a href="index.html" class="text-sm font-medium text-emerald-600 hover:underline">← Kembali ke Katalog</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 no-print">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h2 class="font-extrabold text-xl text-gray-800 flex items-center gap-2">📦 Antrean Pesanan</h2>
                <button onclick="fetchOrders()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-4 py-2 rounded-xl text-sm transition">🔄 Refresh</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-gray-200 text-gray-400 text-sm uppercase font-bold bg-gray-50">
                            <th class="py-3 px-4">Waktu</th>
                            <th class="py-3 px-4">Nama (No HP)</th>
                            <th class="py-3 px-4">Produk</th>
                            <th class="py-3 px-4">Alamat</th>
                            <th class="py-3 px-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="order-table-body" class="text-sm divide-y divide-gray-100">
                        <tr><td colspan="5" class="text-center py-8 text-gray-400">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="print-area" class="hidden fixed inset-0 bg-white flex items-center justify-center p-4 z-50">
        <div class="w-[500px] border-4 border-dashed border-gray-800 p-6 bg-white rounded-md font-sans">
            <div class="flex items-center justify-between border-b-2 border-gray-800 pb-4 mb-4">
                <h2 class="font-black text-2xl tracking-wider">FIGURORAMA</h2>
                <div class="text-right text-xs font-bold text-gray-500"><p>Semarang</p><p>0813-2255-5224</p></div>
            </div>
            <div class="space-y-4">
                <div><span class="text-xs font-bold text-gray-500 uppercase">Kepada Penerima:</span>
                    <h3 id="lbl-penerima" class="text-xl font-black mt-0.5">Nama & No HP</h3></div>
                <div class="bg-gray-50 p-3 rounded border border-gray-300">
                    <span class="text-xs font-bold text-gray-500 uppercase">Alamat:</span>
                    <p id="lbl-alamat" class="text-sm font-medium mt-1"></p></div>
                <div><span class="text-xs font-bold text-gray-500 uppercase">Isi Paket:</span>
                    <p id="lbl-produk" class="text-sm font-bold text-emerald-900 mt-1"></p></div>
            </div>
        </div>
    </div>

    <script>
        const orderCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT4brsOWYbLuGELkJLNOKKWXpp_3Mjl9SfLtEZrubTICoBrPdwlYrbz0Cl-YC20DnrBMjvdTMhuLc2U/pub?gid=214571553&single=true&output=csv";

        async function fetchOrders() {
            const tbody = document.getElementById('order-table-body');
            try {
                const res = await fetch(orderCsvUrl);
                const text = await res.text();
                let r = [], row = ['']; let q = false;
                for (let i = 0; i < text.length; i++) {
                    let c = text[i], next = text[i+1];
                    if (c === '"') { if (q && next === '"') { row[row.length - 1] += '"'; i++; } else { q = !q; } }
                    else if (c === ',' && !q) { row.push(''); }
                    else if ((c === '\r' || c === '\n') && !q) { if (c === '\r' && next === '\n') i++; r.push(row); row = ['']; }
                    else { row[row.length - 1] += c; }
                }
                r.push(row);
                const headers = r[0].map(h => h.trim());
                const orders = r.slice(1).filter(row => row.length === headers.length).map(row => {
                    let obj = {}; headers.forEach((h, i) => obj[h] = row[i]); return obj;
                }).reverse();

                tbody.innerHTML = orders.map(ord => {
                    const time = ord[headers[0]];
                    const nama = ord[headers[1]];
                    const hp = ord[headers[4]] || 'No HP Kosong';
                    const alamat = ord[headers[2]];
                    const rawProduk = ord[headers[3]];
                    
                    // LANGSUNG POTONG: Ambil teks sebelum ketemu kata "harga", "subtotal", "total", "estimasi", atau "rp"
                    const produkBersih = rawProduk.split(/(subtotal|total|estimasi|harga|rp|ongkir)/i)[0].trim();

                    return `
                        <tr class="border-b">
                            <td class="py-4 px-4">${time}</td>
                            <td class="py-4 px-4 font-bold">${nama} (${hp})</td>
                            <td class="py-4 px-4 text-emerald-700">${produkBersih}</td>
                            <td class="py-4 px-4 text-xs">${alamat}</td>
                            <td class="py-4 px-4 text-center">
                                <button onclick="printLabel('${btoa(nama + ' (' + hp + ')')}','${btoa(alamat)}','${btoa(produkBersih)}')" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs font-bold">🖨️ Cetak</button>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch(e) { tbody.innerHTML = '<tr><td colspan="5" class="text-center py-8 text-red-500">Gagal memuat data.</td></tr>'; }
        }

        function printLabel(b64Nama, b64Alamat, b64Produk) {
            document.getElementById('lbl-penerima').innerText = atob(b64Nama);
            document.getElementById('lbl-alamat').innerText = atob(b64Alamat);
            document.getElementById('lbl-produk').innerText = atob(b64Produk);
            document.getElementById('print-area').classList.remove('hidden');
            setTimeout(() => { window.print(); document.getElementById('print-area').classList.add('hidden'); }, 250);
        }
        window.onload = fetchOrders;
    </script>
</body>
</html>
